name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

            - name: Setup Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: 22
                  registry-url: https://npm.pkg.github.com
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            - name: Lint published package (publint)
              run: npm run check:publint

            - name: Validate type resolution (are-the-types-wrong)
              run: npm run check:exports

            - name: Verify tag matches package version
              run: |
                  PKG_VERSION="v$(node -p "require('./package.json').version")"
                  if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
                    echo "tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}"
                    exit 1
                  fi

            - name: Publish
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
