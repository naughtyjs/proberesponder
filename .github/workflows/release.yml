name: Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: 22
                  registry-url: https://npm.pkg.github.com
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Test
              run: npm test

            - name: Build
              run: npm run build

            - name: Lint published package (publint)
              run: npm run check:publint

            - name: Validate type resolution (are-the-types-wrong)
              run: npm run check:exports

            - name: Verify tag matches package version
              run: |
                  PKG_VERSION="v$(node -p "require('./package.json').version")"
                  if [ "$PKG_VERSION" != "${GITHUB_REF_NAME}" ]; then
                    echo "tag ${GITHUB_REF_NAME} does not match package version ${PKG_VERSION}"
                    exit 1
                  fi

            - name: Publish
              run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
